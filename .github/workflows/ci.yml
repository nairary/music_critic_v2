name: Required test suite

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: full-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    name: full-suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "torch>=2.8,<3" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"
      - name: Run full test suite
        run: python -m pytest -q
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests
